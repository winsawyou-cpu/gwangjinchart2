<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>광진구 데이터 리포트 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } = window.Recharts;

        const Icon = ({ name, className }) => {
            const icons = {
                dashboard: <path d="M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zm-11 11h7v-7H3v7z" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" />,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5" />,
                file: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                    </>
                ),
                check: (
                    <>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </>
                ),
                info: (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </>
                ),
                loader: <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const GWANGJIN_DONGS = [
            '중곡1동', '중곡2동', '중곡3동', '중곡4동', '능동', 
            '구의1동', '구의2동', '구의3동', '광장동', '자양1동', 
            '자양2동', '자양3동', '자양4동', '화양동', '군자동'
        ];

        const CustomLabel = (props) => {
            const { x, y, width, value, payload, highlight, isMobile } = props;
            const isHigh = payload?.name === highlight;
            if (value === 0 || value === undefined) return null;

            return (
                <text
                    x={x + width / 2}
                    y={y - (isMobile ? 8 : 12)}
                    textAnchor="middle"
                    fill={isHigh ? '#3730a3' : '#6366f1'}
                    style={{ 
                        fontSize: isHigh ? (isMobile ? '11px' : '14px') : (isMobile ? '8.5px' : '11px'), 
                        fontWeight: isHigh ? '800' : '600',
                        opacity: isHigh ? 1 : 0.8
                    }}
                >
                    {value.toLocaleString()}
                </text>
            );
        };

        // 모바일에서 대각선으로 회전시키는 커스텀 축 라벨
        const CustomXAxisTick = (props) => {
            const { x, y, payload, isMobile } = props;
            
            return (
                <g transform={`translate(${x},${y})`}>
                    <text
                        x={0}
                        y={0}
                        dy={12}
                        textAnchor={isMobile ? "end" : "middle"}
                        fill="#64748b"
                        transform={isMobile ? "rotate(-45)" : "rotate(0)"}
                        style={{ 
                            fontSize: isMobile ? '10px' : '12px', 
                            fontWeight: 600,
                            letterSpacing: isMobile ? '-0.5px' : 'normal'
                        }}
                    >
                        {payload.value}
                    </text>
                </g>
            );
        };

        const App = () => {
            const exportRef = useRef(null);
            const [reportTitle, setReportTitle] = useState('2026 광진구 주요 행정 지표 분석');
            const [unit, setUnit] = useState('명');
            const [dataDate, setDataDate] = useState(new Date().toLocaleDateString('ko-KR'));
            const [highlightedDong, setHighlightedDong] = useState('광장동');
            const [isGenerating, setIsGenerating] = useState(false);
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const [data, setData] = useState(
                GWANGJIN_DONGS.map(dong => ({ name: dong, value: Math.floor(Math.random() * 800) + 200 }))
            );

            useEffect(() => {
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const isMobile = windowWidth < 640;

            const handleDataUpdate = (index, rawValue) => {
                const numericValue = parseInt(rawValue.replace(/[^0-9]/g, '')) || 0;
                const newData = [...data];
                newData[index].value = Math.max(0, numericValue);
                setData(newData);
            };

            const randomizeData = () => {
                setData(GWANGJIN_DONGS.map(dong => ({ name: dong, value: Math.floor(Math.random() * 900) + 100 })));
            };

            const exportImage = async (format) => {
                if (!exportRef.current || isGenerating) return;
                const svgElement = exportRef.current.querySelector('svg');
                if (!svgElement) return;
                setIsGenerating(true);

                try {
                    const width = exportRef.current.clientWidth;
                    const height = exportRef.current.clientHeight;
                    const serializer = new XMLSerializer();
                    let sourceXml = serializer.serializeToString(svgElement);
                    
                    if (!sourceXml.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                        sourceXml = sourceXml.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                    }

                    if (format === 'svg') {
                        const blob = new Blob(['<?xml version="1.0" standalone="no"?>\r\n' + sourceXml], { type: 'image/svg+xml;charset=utf-8' });
                        const url = URL.createObjectURL(blob);
                        triggerDownload(url, `${reportTitle}.svg`);
                    } else {
                        const scale = 3; 
                        const canvas = document.createElement('canvas');
                        canvas.width = width * scale;
                        canvas.height = height * scale;
                        const ctx = canvas.getContext('2d');
                        const img = new Image();
                        const svgBlob = new Blob([sourceXml], { type: 'image/svg+xml;charset=utf-8' });
                        const url = URL.createObjectURL(svgBlob);

                        img.onload = () => {
                            ctx.scale(scale, scale);
                            ctx.fillStyle = '#ffffff';
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(img, 0, 0);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                            triggerDownload(dataUrl, `${reportTitle}.jpg`);
                            URL.revokeObjectURL(url);
                        };
                        img.src = url;
                    }
                } catch (error) {
                    console.error("Export failed:", error);
                    setIsGenerating(false);
                }
            };

            const triggerDownload = (url, fileName) => {
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => setIsGenerating(false), 500);
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-slate-900 text-white px-4 py-4 sm:px-6 flex items-center justify-between shadow-lg mb-4 sm:mb-8 sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <Icon name="dashboard" className="w-5 h-5 sm:w-6 sm:h-6 text-indigo-400" />
                            <h1 className="text-base sm:text-xl font-bold tracking-tight">Gwangjin <span className="text-indigo-400">Dash</span></h1>
                        </div>
                        <div className="flex items-center gap-4 text-xs sm:text-sm font-medium text-slate-300">
                            <span className="hidden sm:flex items-center gap-1"><Icon name="check" className="w-4 h-4 text-green-400" /> Report Optimized</span>
                            <span className="bg-slate-800 px-3 py-1 rounded-full text-xs font-bold">Mobile Opt.</span>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-3 sm:px-4 grid grid-cols-1 lg:grid-cols-12 gap-5 lg:gap-8">
                        <div className="lg:col-span-4 space-y-5 order-2 lg:order-1">
                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6">
                                <div className="flex items-center gap-2 mb-4 sm:mb-6 pb-2 border-b border-slate-100">
                                    <Icon name="file" className="w-5 h-5 text-indigo-600" />
                                    <h2 className="text-sm sm:text-base font-bold text-slate-800 tracking-tight">보고서 기본 설정</h2>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">메인 제목</label>
                                        <input type="text" value={reportTitle} onChange={(e) => setReportTitle(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">단위</label>
                                            <input type="text" value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">데이터 기준일</label>
                                            <input type="text" value={dataDate} onChange={(e) => setDataDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-bold text-indigo-600 mb-1 uppercase tracking-wider">강조 지역</label>
                                        <select value={highlightedDong} onChange={(e) => setHighlightedDong(e.target.value)} className="w-full bg-indigo-50 border border-indigo-200 text-indigo-700 font-bold rounded-xl px-3 sm:px-4 py-2.5 text-sm outline-none cursor-pointer">
                                            {GWANGJIN_DONGS.map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-sm sm:text-base font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="dashboard" className="w-5 h-5 text-indigo-600" /> 데이터 실시간 편집
                                    </h2>
                                    <button onClick={randomizeData} className="text-slate-400 hover:text-indigo-600 p-2 rounded-lg hover:bg-slate-100 transition-all"><Icon name="rotate" className="w-4 h-4" /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 sm:gap-3 max-h-[250px] sm:max-h-[350px] overflow-y-auto pr-1 custom-scrollbar">
                                    {data.map((item, idx) => (
                                        <div key={item.name} className={`p-2 sm:p-3 rounded-xl border transition-all ${item.name === highlightedDong ? 'bg-indigo-50 border-indigo-200 shadow-sm ring-1 ring-indigo-200' : 'bg-white border-slate-100'}`}>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1">{item.name}</label>
                                            <input type="text" value={item.value} onChange={(e) => handleDataUpdate(idx, e.target.value)} className="w-full bg-transparent border-none p-0 text-sm font-bold outline-none text-slate-700 focus:ring-0" />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-8 space-y-4 order-1 lg:order-2">
                            <div className="flex flex-col sm:flex-row gap-2 sm:gap-3">
                                <button onClick={() => exportImage('jpg')} disabled={isGenerating} className="flex-1 flex items-center justify-center gap-2 bg-indigo-600 text-white px-4 sm:px-6 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-sm font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 disabled:opacity-70">
                                    {isGenerating ? <Icon name="loader" className="w-4 h-4 animate-spin" /> : <Icon name="download" className="w-4 h-4" />}
                                    보고서 이미지 저장 (JPG)
                                </button>
                                <button onClick={() => exportImage('svg')} disabled={isGenerating} className="flex items-center justify-center gap-2 bg-slate-200 text-slate-700 px-4 sm:px-6 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-sm font-bold hover:bg-slate-300 transition-all active:scale-95">
                                    SVG(벡터) 저장
                                </button>
                            </div>

                            <div className="relative">
                                <div ref={exportRef} className="bg-white rounded-2xl sm:rounded-3xl shadow-xl sm:shadow-2xl border border-slate-200 overflow-hidden h-[500px] sm:h-[600px] w-full transition-all">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart 
                                            data={data} 
                                            margin={{ 
                                                top: isMobile ? 80 : 130, 
                                                right: isMobile ? 20 : 40, 
                                                left: isMobile ? -10 : 10, 
                                                bottom: isMobile ? 70 : 50 // 대각선 글자가 잘리지 않도록 하단 여백 추가
                                            }} 
                                            barSize={isMobile ? 14 : 32}
                                        >
                                            <text x="50%" y={isMobile ? 35 : 50} textAnchor="middle" fill="#1e293b" style={{ fontSize: isMobile ? '16px' : '28px', fontWeight: '900', letterSpacing: '-0.02em' }}>{reportTitle}</text>
                                            <text x="50%" y={isMobile ? 55 : 85} textAnchor="middle" fill="#64748b" style={{ fontSize: isMobile ? '10px' : '14px', fontWeight: '500' }}>단위: {unit} | 데이터 기준일: {dataDate}</text>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis 
                                                dataKey="name" 
                                                axisLine={{ stroke: '#e2e8f0' }} 
                                                tickLine={false} 
                                                tick={<CustomXAxisTick isMobile={isMobile} />} 
                                                interval={0}
                                            />
                                            <YAxis axisLine={false} tickLine={false} tick={{ fill: '#94a3b8', fontSize: isMobile ? 9 : 10 }} tickFormatter={(v) => v.toLocaleString()} width={isMobile ? 40 : 60} />
                                            <Tooltip cursor={{ fill: 'rgba(79, 70, 229, 0.05)' }} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 5px 15px rgba(0,0,0,0.1)', padding: '10px', fontSize: '12px' }} />
                                            <Bar dataKey="value" radius={[6, 6, 0, 0]} animationDuration={1000}>
                                                {data.map((entry, index) => (
                                                    <Cell key={index} fill={entry.name === highlightedDong ? '#4f46e5' : '#a5b4fc'} />
                                                ))}
                                                <LabelList dataKey="value" content={<CustomLabel highlight={highlightedDong} isMobile={isMobile} />} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
